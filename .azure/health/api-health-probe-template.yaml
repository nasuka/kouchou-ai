properties:
  template:
    containers:
      - name: api
        image: ${API_IMAGE}
        probes:
          - type: liveness
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
    scale:
      minReplicas: 1
      maxReplicas: 1