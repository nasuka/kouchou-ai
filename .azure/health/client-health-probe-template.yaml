properties:
  template:
    containers:
      - name: client
        image: ${CLIENT_IMAGE}
        probes:
          - type: liveness
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
    scale:
      minReplicas: 1
      maxReplicas: 1