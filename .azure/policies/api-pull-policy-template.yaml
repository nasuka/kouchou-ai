properties:
  template:
    containers:
      - name: api
        image: ${API_IMAGE}
        resources:
          cpu: 0.5
          memory: 1Gi
    scale:
      minReplicas: 1
    imageRegistryCredentials:
      server: ${REGISTRY_SERVER}
    registries:
      - server: ${REGISTRY_SERVER}
        identity: ""
    imagePullPolicy: Always